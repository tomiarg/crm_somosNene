<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOMOSNENE - Agencia CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F9FAFB; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-btn.active { border-bottom: 3px solid #EF4444; color: #EF4444; }
        .card-pending { border-left: 5px solid #EF4444; }
        .card-paid { border-left: 5px solid #10B981; opacity: 0.7; }
    </style>
</head>
<body class="text-slate-800">

    <div id="login-overlay" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center hidden">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-80 text-center">
            <h2 class="text-2xl font-extrabold mb-4 italic text-red-600">SOMOSNENE</h2>
            <input type="email" id="login-email" placeholder="Email de equipo" class="w-full p-3 border rounded-xl mb-4 text-center outline-none focus:ring-2 focus:ring-red-500">
            <button onclick="login()" class="bg-slate-900 text-white w-full py-3 rounded-xl font-bold">Ingresar</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tighter">SENE<span class="text-red-600">.</span> CRM</h1>
                <p id="user-welcome" class="text-slate-500 text-sm font-medium italic"></p>
            </div>
            <button onclick="logout()" class="text-xs font-bold text-slate-400 uppercase hover:text-red-500">Cerrar Sesión</button>
        </header>

        <nav class="flex gap-8 border-b border-slate-200 mb-8 overflow-x-auto whitespace-nowrap">
            <button onclick="showTab('cobranzas')" id="nav-cobranzas" class="tab-btn active pb-4 px-2 font-bold text-sm uppercase tracking-wider">Cobranzas</button>
            <button onclick="showTab('clientes')" id="nav-clientes" class="tab-btn pb-4 px-2 font-bold text-sm uppercase tracking-wider">Clientes (Pass)</button>
            <button onclick="showTab('calendario')" id="nav-calendario" class="tab-btn pb-4 px-2 font-bold text-sm uppercase tracking-wider">Calendario</button>
        </nav>

        <section id="cobranzas" class="tab-content active">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="lista-cobranzas">
                </div>
        </section>

        <section id="clientes" class="tab-content">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-400 text-[10px] uppercase font-bold">
                        <tr>
                            <th class="p-4">Cliente</th>
                            <th class="p-4">IG User</th>
                            <th class="p-4">Contraseña</th>
                            <th class="p-4">Fee Mensual</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-clientes-body" class="text-sm"></tbody>
                </table>
            </div>
        </section>

        <section id="calendario" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">Tareas del Equipo</h3>
                <button onclick="nuevaTarea()" id="btn-nueva-tarea" class="bg-red-600 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-slate-900 transition-all">+ Nueva Tarea</button>
            </div>
            <div id="lista-tareas" class="space-y-3">
                </div>
        </section>
    </div>

    <script>
        const API_URL = ""; // Tu URL de Railway aquí
        const EQUIPO = {
            'yani@mail.com': { nombre: 'Yani', rol: 'admin' },
            'tomi@mail.com': { nombre: 'Tomi', rol: 'admin' },
            'mumi@mail.com': { nombre: 'Mumi', rol: 'operador' }
        };

        let user = JSON.parse(localStorage.getItem('crm_user'));

        function login() {
            const email = document.getElementById('login-email').value.toLowerCase();
            if (EQUIPO[email]) {
                localStorage.setItem('crm_user', JSON.stringify(EQUIPO[email]));
                window.location.reload();
            } else {
                alert("Email no autorizado");
            }
        }

        if (!user) {
            document.getElementById('login-overlay').classList.remove('hidden');
        } else {
            document.getElementById('user-welcome').innerText = `Hola, ${user.nombre} (${user.rol})`;
            if (user.rol === 'operador') {
                document.getElementById('nav-cobranzas').remove();
                document.getElementById('nav-clientes').remove();
                document.getElementById('btn-nueva-tarea').remove();
                showTab('calendario');
            }
            init();
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('nav-' + tabId).classList.add('active');
        }

        async function init() {
            if (user.rol === 'admin') {
                cargarCobranzas();
                cargarClientesFull();
            }
            cargarTareas();
        }

        async function cargarCobranzas() {
            const res = await fetch(`${API_URL}/api/pagos-estado`);
            const data = await res.json();
            const cont = document.getElementById('lista-cobranzas');
            cont.innerHTML = data.map(c => `
                <div class="${c.estado === 'pagado' ? 'card-paid' : 'card-pending'} bg-white p-5 rounded-2xl shadow-sm flex justify-between items-center">
                    <div>
                        <h4 class="font-extrabold text-lg">${c.nombre_cliente}</h4>
                        <p class="text-xs text-slate-400 font-mono italic">${c.id_cliente}</p>
                    </div>
                    <div class="text-right">
                        <span class="text-xl font-black ${c.estado === 'pagado' ? 'text-emerald-500' : 'text-red-500'}">
                            ${c.estado === 'pagado' ? 'PAGADO' : '$' + (c.monto_usd || c.monto_ars)}
                        </span>
                        ${c.estado !== 'pagado' ? `<br><button onclick="registrarPago('${c.id_cliente}')" class="text-[9px] font-bold uppercase bg-slate-100 px-2 py-1 rounded-md mt-2">Cargar Pago</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        async function cargarClientesFull() {
            const res = await fetch(`${API_URL}/api/pagos-estado`); // Reusamos esta ruta que ya trae datos de clientes
            const data = await res.json();
            document.getElementById('tabla-clientes-body').innerHTML = data.map(c => `
                <tr class="border-b border-slate-50">
                    <td class="p-4 font-bold text-red-600">${c.nombre_cliente}</td>
                    <td class="p-4 text-slate-500 italic">${c.user_ig || 'n/a'}</td>
                    <td class="p-4"><span class="bg-slate-100 px-2 py-1 rounded blur-[3px] hover:blur-none transition-all cursor-pointer font-mono">${c.pass_ig || '****'}</span></td>
                    <td class="p-4 font-bold text-slate-900">$${c.monto_usd || c.monto_ars}</td>
                </tr>
            `).join('');
        }

        async function registrarPago(id) {
            const monto = prompt("Monto exacto:");
            const forma = prompt("Método (Transfer, Efectivo, USDT):");
            if(monto) {
                await fetch(`${API_URL}/api/registrar-pago`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id_cliente: id, monto, forma_pago: forma})
                });
                cargarCobranzas();
            }
        }

        async function cargarTareas() {
            const cont = document.getElementById('lista-tareas');
            cont.innerHTML = "<p class='text-slate-400 text-sm italic'>Cargando tareas...</p>";
            // Aquí iría el fetch a /api/tareas
        }

        function logout() {
            localStorage.clear();
            window.location.reload();
        }
    </script>
</body>
</html>
