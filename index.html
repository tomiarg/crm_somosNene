<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENE CRM | Agencia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8F9FA; color: #1e293b; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-btn.active { color: #EF4444; border-bottom: 3px solid #EF4444; }
        .stat-card { background: white; padding: 20px; border-radius: 20px; border: 1px solid #f1f5f9; }
        .card-pending { border-left: 5px solid #EF4444; background: #fff5f5; }
        .card-paid { border-left: 5px solid #10B981; background: #f0fdf4; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
    </style>
</head>
<body>

    <div id="login-overlay" class="fixed inset-0 bg-white z-50 flex items-center justify-center hidden">
        <div class="w-full max-w-sm p-8 text-center">
            <h1 class="text-4xl font-extrabold mb-8 italic tracking-tighter text-red-500">SOMOSNENE.</h1>
            <input type="email" id="login-email" placeholder="Email de equipo" class="w-full p-4 border rounded-2xl mb-4 outline-none bg-gray-50 focus:ring-2 focus:ring-red-500">
            <button onclick="login()" class="bg-red-500 text-white w-full py-4 rounded-2xl font-bold shadow-lg shadow-red-200 hover:bg-red-600 transition-all">Entrar</button>
        </div>
    </div>

    <div id="modal-tarea" class="modal">
        <div class="bg-white p-8 rounded-3xl w-full max-w-md shadow-2xl">
            <h3 class="text-xl font-extrabold mb-6">Asignar Tarea</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold uppercase text-slate-400">Cliente</label>
                    <select id="task-client-select" class="w-full p-3 border rounded-xl bg-slate-50 outline-none"></select>
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase text-slate-400">Acción</label>
                    <select id="task-type-select" class="w-full p-3 border rounded-xl bg-slate-50 outline-none">
                        <option value="Reel">Posteo: Reel</option>
                        <option value="Post Plano">Posteo: Plano</option>
                        <option value="Carrusel">Posteo: Carrusel</option>
                        <option value="Story: Replicar">Story: Replicar</option>
                        <option value="Story: Fuerte">Story: Fuerte</option>
                        <option value="Pauta">Pauta Publicitaria</option>
                    </select>
                </div>
                <div id="pauta-extra" class="hidden space-y-4">
                    <input type="number" id="pauta-monto" placeholder="Monto Inversión" class="w-full p-3 border rounded-xl bg-slate-50">
                    <input type="text" id="pauta-seg" placeholder="Segmentación" class="w-full p-3 border rounded-xl bg-slate-50">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase text-slate-400">Asignar a</label>
                    <select id="task-user-select" class="w-full p-3 border rounded-xl bg-slate-50 outline-none">
                        <option value="Mumi">Mumi</option>
                        <option value="Yani">Yani</option>
                        <option value="Tomi">Tomi</option>
                    </select>
                </div>
                <div class="flex gap-2 pt-4">
                    <button onclick="cerrarModales()" class="flex-1 py-3 font-bold text-slate-400 hover:bg-slate-50 rounded-xl">Cancelar</button>
                    <button onclick="guardarTarea()" class="flex-1 py-3 bg-red-500 text-white font-bold rounded-xl shadow-lg shadow-red-100">Asignar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto p-6 md:p-10">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-black italic tracking-tighter uppercase">SENE CRM</h1>
            <div class="flex items-center gap-4 text-xs font-bold uppercase text-slate-400">
                <span id="user-welcome"></span>
                <button onclick="logout()" class="hover:text-red-500">Salir</button>
            </div>
        </header>

        <div id="stats-container" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div class="stat-card">
                <p class="text-[10px] font-bold text-slate-400 uppercase">Clientes Activos</p>
                <h2 id="st-clientes" class="text-3xl font-extrabold mt-1">0</h2>
                <p class="text-[10px] text-green-500 font-bold">+2 este mes</p>
            </div>
            <div class="stat-card">
                <p class="text-[10px] font-bold text-slate-400 uppercase">Vencidos</p>
                <h2 id="st-vencidos" class="text-3xl font-extrabold mt-1 text-red-500">0</h2>
                <p class="text-[10px] text-red-400 italic">Requieren atención</p>
            </div>
            <div class="stat-card">
                <p class="text-[10px] font-bold text-slate-400 uppercase">Ingresos Mes</p>
                <h2 id="st-cobrado" class="text-3xl font-extrabold mt-1 text-emerald-500">$0</h2>
                <p class="text-[10px] text-green-500 font-bold">+12% vs anterior</p>
            </div>
            <div class="stat-card">
                <p class="text-[10px] font-bold text-slate-400 uppercase">Tareas Hoy</p>
                <h2 id="st-tareas" class="text-3xl font-extrabold mt-1 text-slate-800">0</h2>
                <p id="st-tareas-desc" class="text-[10px] text-slate-400">0 completadas</p>
            </div>
        </div>

        <nav class="flex gap-8 border-b mb-8 overflow-x-auto whitespace-nowrap scrollbar-hide">
            <button onclick="showTab('cobranzas')" id="nav-cobranzas" class="tab-btn active pb-4 text-xs font-black uppercase tracking-widest transition-all">Cobranzas</button>
            <button onclick="showTab('clientes')" id="nav-clientes" class="tab-btn pb-4 text-xs font-black uppercase tracking-widest transition-all">Base Clientes</button>
            <button onclick="showTab('calendario')" id="nav-calendario" class="tab-btn pb-4 text-xs font-black uppercase tracking-widest transition-all">Calendario</button>
        </nav>

        <section id="cobranzas" class="tab-content active">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="cont-cobranzas"></div>
        </section>

        <section id="clientes" class="tab-content">
            <div class="flex justify-end mb-4">
                <button onclick="modalNuevoCliente()" class="bg-black text-white px-6 py-3 rounded-2xl text-xs font-bold hover:bg-red-500 transition-all">+ Nuevo Cliente</button>
            </div>
            <div class="bg-white rounded-3xl border border-slate-100 overflow-hidden shadow-sm">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 border-b">
                        <tr>
                            <th class="p-5 font-bold">Nombre</th>
                            <th class="p-5 font-bold">IG / Contraseña</th>
                            <th class="p-5 font-bold text-right">Fee Mensual</th>
                            <th class="p-5 font-bold text-right">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="cont-clientes-full"></tbody>
                </table>
            </div>
        </section>
<style>
    /* Colores por Usuario */
    .user-mumi { background-color: #E0F2FE; color: #0369A1; border-left: 3px solid #0EA5E9; }
    .user-tomi { background-color: #DCFCE7; color: #15803D; border-left: 3px solid #22C55E; }
    .user-yani { background-color: #FCE7F3; color: #BE185D; border-left: 3px solid #EC4899; }

    /* Grid del Calendario */
    .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 1px;
        background-color: #f1f5f9;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        overflow: hidden;
    }
    .calendar-day {
        background: white;
        min-height: 120px;
        padding: 8px;
        font-size: 11px;
    }
    .calendar-header-day {
        background: #f8fafc;
        padding: 10px;
        text-align: center;
        font-weight: 800;
        font-size: 10px;
        text-transform: uppercase;
        color: #64748b;
    }
    .task-tag {
        border-radius: 4px;
        padding: 2px 6px;
        margin-top: 4px;
        font-weight: 700;
        display: block;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
</style>

<section id="calendario" class="tab-content">
    <div class="flex justify-between items-center mb-6">
        <h3 class="text-xl font-bold">Calendario Operativo</h3>
        <button onclick="abrirModalTarea()" class="bg-red-500 text-white px-6 py-2 rounded-xl font-bold hover:bg-black transition-all">+ Nueva Tarea</button>
    </div>

    <div class="grid grid-cols-7 mb-1">
        <div class="calendar-header-day">Lun</div>
        <div class="calendar-header-day">Mar</div>
        <div class="calendar-header-day">Mié</div>
        <div class="calendar-header-day">Jue</div>
        <div class="calendar-header-day">Vie</div>
        <div class="calendar-header-day">Sáb</div>
        <div class="calendar-header-day">Dom</div>
    </div>
    
    <div id="calendar-body" class="calendar-grid">
        </div>
</section>

<div id="modal-tarea" class="modal">
    <div class="bg-white p-8 rounded-3xl w-full max-w-md">
        <h3 class="text-xl font-bold mb-4">Nueva Tarea</h3>
        <div class="space-y-4">
            <select id="task-client-select" class="w-full p-3 border rounded-xl bg-slate-50"></select>
            <input type="date" id="task-date" class="w-full p-3 border rounded-xl bg-slate-50">
            <select id="task-type-select" class="w-full p-3 border rounded-xl bg-slate-50">
                <option value="Reel">Reel</option>
                <option value="Pauta">Pauta</option>
                <option value="Story">Story</option>
            </select>
            <select id="task-user-select" class="w-full p-3 border rounded-xl bg-slate-50">
                <option value="Mumi">Mumi</option>
                <option value="Tomi">Tomi</option>
                <option value="Yani">Yani</option>
            </select>
            <button onclick="guardarTarea()" class="w-full py-4 bg-red-500 text-white font-bold rounded-2xl">Guardar en Calendario</button>
        </div>
    </div>
</div>
    </div>

    <script>
        const API_URL = ""; 
        const EQUIPO = {
            'yani.ls@gmail.com': { nombre: 'Yani', rol: 'admin' },
            'tomimoyanook@gmail.com': { nombre: 'Tomi', rol: 'admin' },
            'murivaudagna@mail.com': { nombre: 'Mumi', rol: 'operador' }
        };

        let user = JSON.parse(localStorage.getItem('crm_user'));
        let cacheClientes = [];

        function login() {
            const mail = document.getElementById('login-email').value.toLowerCase().trim();
            if(EQUIPO[mail]) {
                localStorage.setItem('crm_user', JSON.stringify(EQUIPO[mail]));
                window.location.reload();
            } else { alert("Acceso restringido."); }
        }

        if(!user) { document.getElementById('login-overlay').classList.remove('hidden'); }
        else {
            document.getElementById('user-welcome').innerText = `${user.nombre} (${user.rol})`;
            if(user.rol === 'operador') {
                document.getElementById('nav-cobranzas').remove();
                document.getElementById('nav-clientes').remove();
                document.getElementById('stats-container').remove();
                showTab('calendario');
            }
            init();
        }

        function showTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.getElementById('nav-'+t).classList.add('active');
        }

        async function init() {
            const res = await fetch(`${API_URL}/api/pagos-estado`);
            cacheClientes = await res.json();
            
            if(user.rol === 'admin') {
                renderCobranzas(cacheClientes);
                renderClientes(cacheClientes);
                actualizarStats(cacheClientes);
            }
            cargarTareas();
            llenarSelectClientes();
        }

        function llenarSelectClientes() {
            const select = document.getElementById('task-client-select');
            select.innerHTML = cacheClientes.map(c => `<option value="${c.id_cliente}">${c.nombre_cliente}</option>`).join('');
        }

        function actualizarStats(data) {
            document.getElementById('st-clientes').innerText = data.length;
            const vencidos = data.filter(c => c.estado !== 'pagado').length;
            document.getElementById('st-vencidos').innerText = vencidos;
            const cobrado = data.filter(c => c.estado === 'pagado').reduce((acc, c) => acc + (parseFloat(c.monto_pagado) || 0), 0);
            document.getElementById('st-cobrado').innerText = '$' + cobrado.toLocaleString();
        }

        function renderCobranzas(data) {
            document.getElementById('cont-cobranzas').innerHTML = data.map(c => `
                <div class="stat-card ${c.estado === 'pagado' ? 'card-paid' : 'card-pending'} flex justify-between items-center transition-all hover:scale-[1.01] shadow-sm">
                    <div>
                        <h4 class="font-extrabold text-slate-800">${c.nombre_cliente}</h4>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest italic">${c.id_cliente}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xl font-black ${c.estado === 'pagado' ? 'text-emerald-500' : 'text-red-500'}">
                            ${c.estado === 'pagado' ? 'AL DÍA' : '$' + (c.monto_usd || c.monto_ars)}
                        </p>
                        ${c.estado !== 'pagado' ? `<button onclick="pagar('${c.id_cliente}')" class="text-[9px] font-black uppercase text-slate-400 hover:text-black border-b border-transparent hover:border-black transition-all">Registrar Pago</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function renderClientes(data) {
            document.getElementById('cont-clientes-full').innerHTML = data.map(c => `
                <tr class="border-b hover:bg-slate-50 transition-colors">
                    <td class="p-5 font-extrabold italic text-slate-700">${c.nombre_cliente}</td>
                    <td class="p-5 text-xs text-slate-500 font-mono">
                        User: <span class="text-slate-800">${c.user_ig || '-'}</span><br>
                        Pass: <span class="text-red-500">${c.pass_ig || '-'}</span>
                    </td>
                    <td class="p-5 font-bold text-right text-slate-800 italic">$${c.monto_usd || c.monto_ars}</td>
                    <td class="p-5 text-right">
                        <button onclick="eliminarCliente('${c.id_cliente}')" class="text-red-200 hover:text-red-600 transition-colors font-bold text-[10px] uppercase">Baja</button>
                    </td>
                </tr>
            `).join('');
        }

        function abrirModalTarea() { document.getElementById('modal-tarea').classList.add('active'); }
        function cerrarModales() { document.getElementById('modal-tarea').classList.remove('active'); }

        document.getElementById('task-type-select').addEventListener('change', (e) => {
            const extra = document.getElementById('pauta-extra');
            e.target.value === 'Pauta' ? extra.classList.remove('hidden') : extra.classList.add('hidden');
        });

        async function guardarTarea() {
            const data = {
                id_cliente: document.getElementById('task-client-select').value,
                tipo_tarea: document.getElementById('task-type-select').value,
                asignado_a: document.getElementById('task-user-select').value,
                detalle_tarea: {
                    monto: document.getElementById('pauta-monto').value,
                    seg: document.getElementById('pauta-seg').value
                },
                fecha: new Date().toISOString().split('T')[0]
            };
            await fetch(`${API_URL}/api/tareas`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            cerrarModales();
            cargarTareas();
        }

        async function cargarTareas() {
            const res = await fetch(`${API_URL}/api/tareas`);
            const data = await res.json();
            document.getElementById('st-tareas').innerText = data.length;
            document.getElementById('cont-tareas').innerHTML = data.map(t => `
                <div class="stat-card flex justify-between items-center hover:bg-slate-50 transition-all border-l-4 border-red-500">
                    <div>
                        <span class="text-[9px] font-black uppercase text-red-500 tracking-tighter">${t.tipo_tarea}</span>
                        <h4 class="font-extrabold text-slate-800">${t.id_cliente}</h4>
                        ${t.tipo_tarea === 'Pauta' ? `<p class="text-[9px] text-slate-400 font-bold">Monto: $${JSON.parse(t.detalle_tarea).monto} | Seg: ${JSON.parse(t.detalle_tarea).seg}</p>` : ''}
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">${t.asignado_a}</p>
                        <p class="text-xs font-bold font-mono">${new Date(t.fecha_ejecucion).toLocaleDateString()}</p>
                    </div>
                </div>
            `).join('');
        }

        async function pagar(id) {
            const monto = prompt("Monto exacto cobrado:");
            if(monto) {
                await fetch(`${API_URL}/api/registrar-pago`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id_cliente: id, monto, forma_pago: 'Transferencia'})
                });
                init();
            }
        }

        async function eliminarCliente(id) {
            if(confirm("¿Seguro que quieres dar de baja a este cliente?")) {
                await fetch(`${API_URL}/api/clientes/${id}`, { method: 'DELETE' });
                init();
            }
        }

        async function modalNuevoCliente() {
            const id = prompt("ID Único (Ej: MBER):");
            const nombre = prompt("Nombre Comercial:");
            const usd = prompt("Fee USD:");
            const ars = prompt("Fee ARS (Solo número):");
            const user_ig = prompt("Usuario IG:");
            const pass_ig = prompt("Password IG:");
            
            if(id && nombre) {
                await fetch(`${API_URL}/api/clientes`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id_cliente: id, nombre_cliente: nombre, monto_usd: usd, monto_ars: ars, user_ig, pass_ig})
                });
                init();
            }
        }

        function logout() { localStorage.clear(); window.location.reload(); }
    </script>
</body>
</html>
