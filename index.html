<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOMOSNENE - CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #e2e8f0; }
        .card-pending { border-left: 4px solid #ef4444; background: #0f0f12; }
        .card-paid { border-left: 4px solid #22c55e; background: #0a0a0a; opacity: 0.7; }
        .neon-text { text-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-end mb-12">
            <div>
                <h1 class="text-4xl font-black tracking-tighter text-white">SOMOSNENE<span class="text-red-600">.</span></h1>
                <p class="text-slate-500 font-medium">Panel de Control de Clientes</p>
            </div>
            <div id="fecha-actual" class="text-right font-mono text-sm text-red-500"></div>
        </header>

        <div id="lista-clientes" class="grid gap-4">
            <div class="animate-pulse bg-white/5 h-20 rounded-xl"></div>
        </div>
    </div>

    <script>
        // CAMBIA ESTO por la URL que te dio Railway para tu APP (ej: https://tu-repo.up.railway.app)
        const API_URL = "https://web-production-b8e5e.up.railway.app"; 

        async function cargarClientes() {
            const res = await fetch(`${API_URL}/api/pagos-estado`);
            const clientes = await res.json();
            const contenedor = document.getElementById('lista-clientes');
            const fechaDiv = document.getElementById('fecha-actual');
            
            fechaDiv.innerText = new Date().toLocaleString('es-AR', { month: 'long', year: 'numeric' }).toUpperCase();
            contenedor.innerHTML = "";

            clientes.forEach(c => {
                const isPaid = c.estado === 'pagado';
                const card = document.createElement('div');
                card.className = `${isPaid ? 'card-paid' : 'card-pending'} p-6 rounded-r-xl flex justify-between items-center transition-all hover:scale-[1.01]`;
                
                card.innerHTML = `
                    <div>
                        <h3 class="text-xl font-bold ${isPaid ? 'text-slate-400' : 'text-white neon-text'}">${c.nombre_cliente}</h3>
                        <p class="text-xs font-mono text-slate-500">${c.id_cliente}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-2xl font-black ${isPaid ? 'text-green-500' : 'text-red-600'}">
                            ${isPaid ? 'PAGADO' : '$' + (c.monto_usd || c.monto_ars)}
                        </p>
                        ${!isPaid ? `<button onclick="registrar('${c.id_cliente}')" class="mt-2 text-[10px] bg-white text-black px-3 py-1 rounded-full font-bold uppercase hover:bg-red-500 hover:text-white transition-colors">Marcar Pago</button>` : ''}
                    </div>
                `;
                contenedor.appendChild(card);
            });
        }

        async function registrar(id) {
            const monto = prompt("Monto cobrado:");
            const forma = prompt("Forma de pago (Transferencia, USDT, Efectivo):");
            
            if (monto) {
                await fetch(`${API_URL}/api/registrar-pago`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id_cliente: id, monto, forma_pago: forma })
                });
                cargarClientes(); // Recargar la lista
            }
        }

        cargarClientes();
    </script>
</body>
</html>
