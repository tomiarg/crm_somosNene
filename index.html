<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENE CRM | Agencia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8F9FA; color: #1e293b; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-btn.active { color: #EF4444; border-bottom: 3px solid #EF4444; }
        .stat-card { background: white; padding: 20px; border-radius: 20px; border: 1px solid #f1f5f9; }
        .card-pending { border-left: 5px solid #EF4444; background: #fff5f5; }
        .card-paid { border-left: 5px solid #10B981; background: #f0fdf4; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }

        /* Colores del Calendario por Usuario */
        .user-mumi { background-color: #22C55E !important; color: white !important; }
        .user-yani { background-color: #A855F7 !important; color: white !important; }
        .user-tomi { background-color: #EAB308 !important; color: white !important; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background-color: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
        .calendar-day { background: white; min-height: 110px; padding: 6px; font-size: 11px; }
        .calendar-header-day { background: #f8fafc; padding: 10px; text-align: center; font-weight: 800; font-size: 10px; text-transform: uppercase; color: #64748b; }
        .task-tag { border-radius: 4px; padding: 2px 4px; margin-top: 2px; font-weight: 700; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

    <div id="login-overlay" class="fixed inset-0 bg-white z-50 flex items-center justify-center hidden">
        <div class="w-full max-w-sm p-8 text-center">
            <h1 class="text-4xl font-extrabold mb-8 italic tracking-tighter text-red-500">SOMOSNENE.</h1>
            <input type="email" id="login-email" placeholder="Email de equipo" class="w-full p-4 border rounded-2xl mb-4 outline-none bg-gray-50 focus:ring-2 focus:ring-red-500 text-center">
            <button onclick="login()" class="bg-red-500 text-white w-full py-4 rounded-2xl font-bold shadow-lg shadow-red-100">Entrar</button>
        </div>
    </div>

    <div id="modal-tarea" class="modal">
        <div class="bg-white p-8 rounded-3xl w-full max-w-md shadow-2xl">
            <h3 class="text-xl font-bold mb-6">Asignar Tarea</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold uppercase text-slate-400">Fecha</label>
                    <input type="date" id="task-date" class="w-full p-3 border rounded-xl bg-slate-50 outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase text-slate-400">Cliente</label>
                    <select id="task-client-select" class="w-full p-3 border rounded-xl bg-slate-50 outline-none"></select>
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase text-slate-400">Tipo</label>
                    <select id="task-type-select" class="w-full p-3 border rounded-xl bg-slate-50 outline-none">
                        <option value="Reel">Reel</option>
                        <option value="Post Plano">Post Plano</option>
                        <option value="Carrusel">Carrusel</option>
                        <option value="Pauta">Pauta</option>
                        <option value="Story">Story</option>
                    </select>
                </div>
                <div id="pauta-extra" class="hidden space-y-4">
                    <input type="number" id="pauta-monto" placeholder="Monto Pauta" class="w-full p-3 border rounded-xl bg-slate-50">
                    <input type="text" id="pauta-seg" placeholder="Segmentación" class="w-full p-3 border rounded-xl bg-slate-50">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase text-slate-400">Asignar a</label>
                    <select id="task-user-select" class="w-full p-3 border rounded-xl bg-slate-50 outline-none">
                        <option value="Mumi">Mumi</option>
                        <option value="Tomi">Tomi</option>
                        <option value="Yani">Yani</option>
                    </select>
                </div>
                <div class="flex gap-2 pt-4">
                    <button onclick="cerrarModales()" class="flex-1 py-3 font-bold text-slate-400">Cancelar</button>
                    <button onclick="guardarTarea()" class="flex-1 py-3 bg-red-500 text-white font-bold rounded-xl shadow-lg shadow-red-100">Asignar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto p-6 md:p-10">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-black italic tracking-tighter uppercase">SENE CRM</h1>
            <div class="flex items-center gap-4 text-xs font-bold text-slate-400">
                <span id="user-welcome"></span>
                <button onclick="logout()" class="hover:text-red-500 uppercase">Salir</button>
            </div>
        </header>

        <div id="stats-container" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div class="stat-card text-center"><p class="text-[10px] font-bold text-slate-400 uppercase">Clientes</p><h2 id="st-clientes" class="text-3xl font-extrabold mt-1">0</h2></div>
            <div class="stat-card text-center"><p class="text-[10px] font-bold text-slate-400 uppercase">Vencidos</p><h2 id="st-vencidos" class="text-3xl font-extrabold mt-1 text-red-500">0</h2></div>
            <div class="stat-card text-center"><p class="text-[10px] font-bold text-slate-400 uppercase">Cobrado</p><h2 id="st-cobrado" class="text-3xl font-extrabold mt-1 text-emerald-500">$0</h2></div>
            <div class="stat-card text-center"><p class="text-[10px] font-bold text-slate-400 uppercase">Tareas</p><h2 id="st-tareas" class="text-3xl font-extrabold mt-1">0</h2></div>
        </div>
        <section id="mis-tareas-container" class="mb-10">
    <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-4 italic">Mis Tareas Pendientes</h3>
    <div id="lista-mis-tareas" class="grid grid-cols-1 md:grid-cols-3 gap-4">
        </div>
</section>

        <nav class="flex gap-8 border-b mb-8 overflow-x-auto whitespace-nowrap scrollbar-hide">
            <button onclick="showTab('cobranzas')" id="nav-cobranzas" class="tab-btn active pb-4 text-xs font-black uppercase tracking-widest transition-all">Cobranzas</button>
            <button onclick="showTab('clientes')" id="nav-clientes" class="tab-btn pb-4 text-xs font-black uppercase tracking-widest transition-all">Base Clientes</button>
            <button onclick="showTab('calendario')" id="nav-calendario" class="tab-btn pb-4 text-xs font-black uppercase tracking-widest transition-all">Calendario</button>
        </nav>

        <section id="cobranzas" class="tab-content active"><div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="cont-cobranzas"></div></section>

        <section id="clientes" class="tab-content">
            <div class="flex justify-end mb-4"><button onclick="modalNuevoCliente()" class="bg-black text-white px-6 py-3 rounded-2xl text-xs font-bold">+ Nuevo Cliente</button></div>
            <div class="bg-white rounded-3xl border border-slate-100 overflow-hidden shadow-sm">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 border-b"><tr><th class="p-5 font-bold">Nombre</th><th class="p-5 font-bold">IG / Pass</th><th class="p-5 font-bold text-right">Fee</th><th class="p-5 font-bold text-right">Acción</th></tr></thead>
                    <tbody id="cont-clientes-full"></tbody>
                </table>
            </div>
        </section>

        <section id="calendario" class="tab-content">
            <div class="flex justify-between items-center mb-6">
    <div class="flex items-center gap-4">
        <button onclick="cambiarMes(-1)" class="p-2 hover:bg-slate-100 rounded-full">◀</button>
        <h3 id="mes-titulo" class="font-bold uppercase text-sm tracking-widest text-slate-800 italic">Mes Año</h3>
        <button onclick="cambiarMes(1)" class="p-2 hover:bg-slate-100 rounded-full">▶</button>
    </div>
    <button onclick="abrirModalTarea()" class="bg-red-500 text-white px-6 py-3 rounded-2xl text-xs font-bold shadow-lg shadow-red-100">+ Asignar Tarea</button>
</div>
            <div class="grid grid-cols-7 mb-1 text-center">
                <div class="calendar-header-day">Lun</div><div class="calendar-header-day">Mar</div><div class="calendar-header-day">Mié</div>
                <div class="calendar-header-day">Jue</div><div class="calendar-header-day">Vie</div><div class="calendar-header-day">Sáb</div><div class="calendar-header-day">Dom</div>
            </div>
            <div id="calendar-body" class="calendar-grid"></div>
        </section>
    </div>
<script>
    const API_URL = ""; 
    const EQUIPO = {
        'yani.ls@gmail.com': { nombre: 'Yani', rol: 'admin' },
        'tomimoyanook@gmail.com': { nombre: 'Tomi', rol: 'admin' },
        'murivaudagna@mail.com': { nombre: 'Mumi', rol: 'operador' }
    };

    let user = JSON.parse(localStorage.getItem('crm_user'));
    let cacheClientes = [];
    let fechaActual = new Date(); // Hoy

    function cambiarMes(delta) {
        fechaActual.setMonth(fechaActual.getMonth() + delta);
        cargarCalendario();
    }

    function login() {
        const mail = document.getElementById('login-email').value.toLowerCase().trim();
        if(EQUIPO[mail]) {
            localStorage.setItem('crm_user', JSON.stringify(EQUIPO[mail]));
            window.location.reload();
        } else { alert("Acceso restringido."); }
    }

    if(!user) { 
        document.getElementById('login-overlay').classList.remove('hidden'); 
    } else {
        document.getElementById('user-welcome').innerText = `${user.nombre} (${user.rol})`;
        if(user.rol === 'operador') {
            document.getElementById('nav-cobranzas').remove();
            document.getElementById('nav-clientes').remove();
            document.getElementById('stats-container').remove();
            showTab('calendario');
        }
        init();
    }

    function showTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(t).classList.add('active');
        document.getElementById('nav-'+t).classList.add('active');
        if(t === 'calendario') cargarCalendario();
    }

    async function init() {
        const res = await fetch(`${API_URL}/api/pagos-estado`);
        cacheClientes = await res.json();
        
        if(user.rol === 'admin') {
            renderCobranzas(cacheClientes);
            renderClientes(cacheClientes);
            actualizarStats(cacheClientes);
        }
        cargarCalendario();
        llenarSelectClientes();
        renderMisTareas(); // <-- Nueva función para ver tareas personales
    }

    // --- NUEVA FUNCIÓN: MIS TAREAS EN DASHBOARD ---
    async function renderMisTareas() {
        const res = await fetch(`${API_URL}/api/tareas`);
        const tareas = await res.json();
        const contenedor = document.getElementById('lista-mis-tareas');
        if(!contenedor) return;

        // Filtramos para que cada uno vea solo lo suyo
        const misTareas = tareas.filter(t => 
            t.asignado_a.toLowerCase() === user.nombre.toLowerCase()
        ).sort((a, b) => new Date(a.fecha_ejecucion) - new Date(b.fecha_ejecucion));

        if (misTareas.length === 0) {
            contenedor.innerHTML = `<p class="text-xs text-slate-400 italic">No tienes tareas asignadas.</p>`;
            return;
        }

        contenedor.innerHTML = misTareas.slice(0, 6).map(t => `
            <div class="stat-card border-l-4 ${t.asignado_a.toLowerCase() === 'mumi' ? 'border-green-500' : t.asignado_a.toLowerCase() === 'tomi' ? 'border-yellow-500' : 'border-purple-500'} bg-white p-4 rounded-xl shadow-sm">
                <div class="flex justify-between items-start">
                    <span class="text-[9px] font-black uppercase text-slate-400">${new Date(t.fecha_ejecucion).toLocaleDateString('es-AR', {weekday: 'short', day: 'numeric'})}</span>
                    <span class="bg-slate-100 text-[8px] px-2 py-0.5 rounded-full font-bold">${t.tipo_tarea}</span>
                </div>
                <h4 class="font-extrabold text-slate-800 mt-2 italic">${t.id_cliente}</h4>
            </div>
        `).join('');
    }

    function llenarSelectClientes() {
        document.getElementById('task-client-select').innerHTML = cacheClientes.map(c => `<option value="${c.id_cliente}">${c.nombre_cliente}</option>`).join('');
    }

    function actualizarStats(data) {
        document.getElementById('st-clientes').innerText = data.length;
        document.getElementById('st-vencidos').innerText = data.filter(c => c.estado !== 'pagado').length;
        const cobrado = data.filter(c => c.estado === 'pagado').reduce((acc, c) => acc + (parseFloat(c.monto_pagado) || 0), 0);
        document.getElementById('st-cobrado').innerText = '$' + cobrado.toLocaleString();
    }

    function renderCobranzas(data) {
        document.getElementById('cont-cobranzas').innerHTML = data.map(c => `
            <div class="stat-card ${c.estado === 'pagado' ? 'card-paid' : 'card-pending'} flex justify-between items-center shadow-sm">
                <div><h4 class="font-extrabold">${c.nombre_cliente}</h4><p class="text-[10px] text-slate-400 font-bold uppercase">${c.id_cliente}</p></div>
                <div class="text-right"><p class="text-xl font-black ${c.estado === 'pagado' ? 'text-emerald-500' : 'text-red-500'}">${c.estado === 'pagado' ? 'PAGADO' : '$' + (c.monto_usd || c.monto_ars)}</p>
                ${c.estado !== 'pagado' ? `<button onclick="pagar('${c.id_cliente}')" class="text-[9px] font-black uppercase text-slate-400">Cargar Pago</button>` : ''}</div>
            </div>`).join('');
    }

    function renderClientes(data) {
        document.getElementById('cont-clientes-full').innerHTML = data.map(c => `
            <tr class="border-b"><td class="p-5 font-extrabold italic">${c.nombre_cliente}</td><td class="p-5 text-xs text-slate-500 font-mono">U: ${c.user_ig || '-'}<br>P: ${c.pass_ig || '-'}</td>
            <td class="p-5 font-bold text-right text-slate-800 italic">$${c.monto_usd || c.monto_ars}</td><td class="p-5 text-right"><button onclick="eliminarCliente('${c.id_cliente}')" class="text-red-300 font-bold text-[10px] uppercase">Baja</button></td></tr>`).join('');
    }

    async function cargarCalendario() {
        const res = await fetch(`${API_URL}/api/tareas`);
        const tareas = await res.json();
        const grid = document.getElementById('calendar-body');
        const titulo = document.getElementById('mes-titulo');
        if(!grid) return;
        
        grid.innerHTML = "";
        const año = fechaActual.getFullYear();
        const mes = fechaActual.getMonth();
        
        const nombreMes = new Intl.DateTimeFormat('es-ES', { month: 'long', year: 'numeric' }).format(fechaActual);
        titulo.innerText = nombreMes;

        const primerDiaMes = new Date(año, mes, 1).getDay();
        const offset = primerDiaMes === 0 ? 6 : primerDiaMes - 1;
        const diasEnMes = new Date(año, mes + 1, 0).getDate();

        for (let i = 0; i < offset; i++) grid.innerHTML += `<div class="calendar-day bg-slate-50/50"></div>`;
        
        for (let d = 1; d <= diasEnMes; d++) {
            const fechaString = `${año}-${String(mes + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const tareasDia = tareas.filter(t => t.fecha_ejecucion.split('T')[0] === fechaString);
            
            let tags = tareasDia.map(t => `<div class="task-tag user-${t.asignado_a.toLowerCase()} text-[9px]">${t.id_cliente}: ${t.tipo_tarea}</div>`).join('');
            
            grid.innerHTML += `
                <div class="calendar-day border-t border-l">
                    <span class="font-bold ${d === new Date().getDate() && mes === new Date().getMonth() ? 'text-red-500' : 'text-slate-300'}">${d}</span>
                    ${tags}
                </div>`;
        }
        document.getElementById('st-tareas').innerText = tareas.length;
    }

    function abrirModalTarea() { document.getElementById('modal-tarea').classList.add('active'); }
    function cerrarModales() { document.getElementById('modal-tarea').classList.remove('active'); }

    async function guardarTarea() {
        const fecha = document.getElementById('task-date').value;
        const cliente = document.getElementById('task-client-select').value;
        const tipo = document.getElementById('task-type-select').value;
        const usuario = document.getElementById('task-user-select').value;

        if (!fecha || !cliente) return alert("Selecciona fecha y cliente");

        const data = {
    id_cliente: document.getElementById('task-client-select').value,
    tipo_tarea: document.getElementById('task-type-select').value,
    asignado_a: document.getElementById('task-user-select').value,
    detalle_tarea: {
        monto: document.getElementById('pauta-monto')?.value || 0,
        seg: document.getElementById('pauta-seg')?.value || ""
    },
    fecha: document.getElementById('task-date').value // <--- Este nombre debe ser 'fecha'
};

        const res = await fetch(`${API_URL}/api/tareas`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        if (res.ok) {
            cerrarModales();
            await cargarCalendario(); 
            renderMisTareas(); // Actualizamos también la lista personal
        }
    }

    async function pagar(id) {
        const monto = prompt("Monto cobrado:");
        if(monto) {
            await fetch(`${API_URL}/api/registrar-pago`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id_cliente: id, monto, forma_pago: 'Transfer'}) });
            init();
        }
    }

    async function eliminarCliente(id) {
        if(confirm("¿Baja?")) { await fetch(`${API_URL}/api/clientes/${id}`, { method: 'DELETE' }); init(); }
    }

    async function modalNuevoCliente() {
        const id = prompt("ID:"); const nombre = prompt("Nombre:"); const usd = prompt("Fee USD:"); const ars = prompt("Fee ARS:"); const user_ig = prompt("IG User:"); const pass_ig = prompt("IG Pass:");
        if(id && nombre) {
            await fetch(`${API_URL}/api/clientes`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id_cliente: id, nombre_cliente: nombre, monto_usd: usd, monto_ars: ars, user_ig, pass_ig}) });
            init();
        }
    }

    function logout() { localStorage.clear(); window.location.reload(); }
</script>
</body>
</html>
